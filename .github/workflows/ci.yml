# Generic CI: the same four-gate verify chain run on every push / PR.
# Mirrors the local `pnpm typecheck && pnpm lint && pnpm test && pnpm build`
# gate documented in AGENTS.md. Turborepo caches across jobs, so re-runs are
# cheap. Adjust the Node version to match .nvmrc.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
