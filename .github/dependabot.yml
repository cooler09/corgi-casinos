version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev tooling into one PR to cut review noise.
      dev-tooling:
        patterns:
          - 'eslint*'
          - 'prettier*'
          - '@types/*'
          - 'typescript'
          - 'vitest'
          - 'turbo'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
